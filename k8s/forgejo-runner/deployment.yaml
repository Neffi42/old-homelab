# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
spec:
  selector:
    matchLabels:
      app: forgejo-runner
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: forgejo-runner
      labels:
        app: forgejo-runner
    spec:
      containers:
        - name: forgejo-runner
          image: data.forgejo.org/forgejo/runner:12
          imagePullPolicy: IfNotPresent
          command: ["forgejo-runner"]
          args: ["daemon", "--config", "/config/runner-config.yaml"]
          volumeMounts:
            - name: forgejo-runner-storage
              mountPath: /data
            - name: config-volume
              mountPath: /config
            - name: secret-volume
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: forgejo-runner-storage
          persistentVolumeClaim:
            claimName: forgejo-runner-longhorn
        - name: config-volume
          configMap:
            name: forgejo-runner-config
        - name: secret-volume
          secret:
            secretName: forgejo-runner-credentials
      restartPolicy: Always
---
