# https://kubernetes.io/docs/concepts/storage/persistent-volumes/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ispyagentdvr-longhorn
  namespace: ispyagentdvr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "longhorn-hdd"
  resources:
    requests:
      storage: 8Gi
---
