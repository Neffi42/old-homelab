# https://kubernetes.io/docs/concepts/storage/persistent-volumes/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefox
  namespace: firefox
  labels:
    app: firefox
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "longhorn-hdd"
  resources:
    requests:
      storage: 8Gi
---
